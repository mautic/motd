name: Validate motd.json

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      motd_changed: ${{ steps.filter.outputs.motd }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            motd:
              - 'motd.json'

  validate:
    runs-on: ubuntu-latest
    needs: check-changes
    if: ${{ needs.check-changes.outputs.motd_changed == 'true' }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate JSON syntax
        run: jq empty motd.json

      - name: Validate category definitions are complete
        run: |
          jq -e '
            .categories | to_entries[] |
            if .value.label == null then
              error("category \(.key) is missing label")
            else
              .
            end
          ' motd.json

      - name: Validate all message categories exist
        run: |
          jq -e '
            . as $root |
            .messages | to_entries[] |
            .key as $index |
            .value.category as $category |
            if $category == null then
              error("message at index \($index) is missing a category field")
            elif ($root.categories | has($category)) | not then
              error("message at index \($index) has unknown category: \($category)")
            else
              .
            end
          ' motd.json

      - name: Validate message content keys are valid
        run: |
          jq -e '
            .messages | to_entries[] |
            .key as $index |
            .value.content |
            if type != "object" then
              error("message at index \($index) content must be an object")
            else
              (keys | map(select(. != "ui" and . != "cli"))) as $invalid_keys |
              if ($invalid_keys | length) > 0 then
                error("message at index \($index) content has invalid keys: \($invalid_keys | join(", "))")
              elif (has("ui") or has("cli")) | not then
                error("message at index \($index) content must have at least one of: ui, cli")
              else
                .
              end
            end
          ' motd.json

      - name: Validate message content arrays are not empty
        run: |
          jq -e '
            .messages | to_entries[] |
            .key as $index |
            .value.content | to_entries[] |
            if (.value | length) == 0 then
              error("message at index \($index) content.\(.key) array is empty")
            else
              .
            end
          ' motd.json

      - name: Validate message content items are strings
        run: |
          jq -e '
            .messages | to_entries[] |
            .key as $index |
            .value.content | to_entries[] |
            .key as $channel |
            .value |
            if type != "array" then
              error("message at index \($index) content.\($channel) must be an array")
            else
              to_entries[] |
              if (.value | type) != "string" then
                error("message at index \($index) content.\($channel) has non-string item at index \(.key)")
              else
                .
              end
            end
          ' motd.json

      - name: Validate message dates are valid ISO 8601
        run: |
          jq -e '
            .messages | to_entries[] |
            .key as $index |
            (.value.start, .value.end) |
            select(. != null) |
            if test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$") | not then
              error("message at index \($index) has invalid date format: \(.)")
            else
              .
            end
          ' motd.json

      - name: Validate start is before end when both are set
        run: |
          jq -e '
            .messages | to_entries[] |
            .key as $index |
            select(.value.start != null and .value.end != null) |
            if .value.start >= .value.end then
              error("message at index \($index) has start date not before end date: \(.value.start) >= \(.value.end)")
            else
              .
            end
          ' motd.json
